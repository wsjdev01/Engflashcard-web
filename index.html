<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 플래시카드</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .counter {
      font-size: 14px;
      color: #999;
      margin-bottom: 16px;
    }

    .card-wrapper {
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      user-select: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .top-section {
      flex: 1;
    }

    .meaning {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .explanation {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
    }

    .divider {
      border: none;
      border-top: 1px dashed #e0e0e0;
      margin: 24px 0;
    }

    .english {
      font-size: 16px;
      color: #1a1a1a;
      opacity: 0.25;
      line-height: 1.6;
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
      max-width: 480px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-prev {
      background: #e8e8e8;
      color: #aaa;
    }

    .btn-prev.active {
      background: #4A90E2;
      color: white;
    }

    .btn-next {
      background: #4A90E2;
      color: white;
    }

    .btn-next.disabled {
      background: #e8e8e8;
      color: #aaa;
    }

    .loading {
      color: #999;
      font-size: 16px;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="counter" id="counter"></div>
  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="loading">불러오는 중...</div>
    </div>
  </div>
  <div class="nav">
    <button class="btn-prev" id="btnPrev" onclick="prevCard()">← 이전</button>
    <button class="btn-next" id="btnNext" onclick="nextCard()">다음 →</button>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw9hzCMBy2uKaS5VP5oc5ShljTICePzVFr6bqbrnXoHoqsziFvFNiCZuipqBqf28bQMCE-swMWACbH/pub?gid=0&single=true&output=csv';
    const STORAGE_KEY = 'engflashcard_state';

    let cards = [];
    let currentIndex = 0;
    let googleSheetKeys = [];

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current.trim());
      return result;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      return lines.slice(1).map(line => {
        const cols = parseCSVLine(line);
        return {
          meaning: cols[0] || '',
          english: cols[1] || '',
          explanation: cols[2] || '',
        };
      }).filter(c => c.english);
    }

    function isReordered(oldKeys, newKeys) {
      const newSet = new Set(newKeys);
      const oldSet = new Set(oldKeys);
      const oldCommon = oldKeys.filter(k => newSet.has(k));
      const newCommon = newKeys.filter(k => oldSet.has(k));
      return oldCommon.join('||') !== newCommon.join('||');
    }

    function cardKey(c) {
      return c.english + '||' + c.meaning + '||' + c.explanation;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        seen: cards.slice(0, currentIndex + 1),
        unseen: cards.slice(currentIndex + 1),
        currentIndex,
        googleSheetKeys
      }));
    }

    function updateButtons() {
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      if (currentIndex === 0) btnPrev.classList.remove('active');
      else btnPrev.classList.add('active');
      if (currentIndex === cards.length - 1) btnNext.classList.add('disabled');
      else btnNext.classList.remove('disabled');
    }

    function renderCard() {
      const card = cards[currentIndex];
      document.getElementById('counter').textContent = `${currentIndex + 1} / ${cards.length}`;
      document.getElementById('card').innerHTML = `
        <div class="top-section">
          <div class="meaning">${card.meaning}</div>
          ${card.explanation ? `<div class="explanation">${card.explanation}</div>` : ''}
        </div>
        <hr class="divider">
        <div class="english">${card.english}</div>
      `;
      updateButtons();
    }

    function nextCard() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        renderCard();
        saveState();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
        saveState();
      }
    }

    // 스와이프 기능
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });

    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0) nextCard();
        else prevCard();
      }
    });

    async function loadCards() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const fetched = parseCSV(text);
        const newKeys = fetched.map(c => c.english);
        const newMap = new Map(fetched.map(c => [c.english, c]));

        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');

        // 처음 접속
        if (!saved) {
          googleSheetKeys = newKeys;
          cards = shuffle(fetched);
          currentIndex = 0;
          saveState();
          renderCard();
          return;
        }

        const oldKeys = saved.googleSheetKeys || [];

        // 순서 변경 감지 → 전체 리셔플
        if (isReordered(oldKeys, newKeys)) {
          googleSheetKeys = newKeys;
          cards = shuffle(fetched);
          currentIndex = 0;
          saveState();
          renderCard();
          return;
        }

        // seen 처리: 삭제된 카드 제거, 내용 변경된 카드는 unseen으로
        const seenCards = [];
        const contentChangedCards = [];
        for (const c of (saved.seen || [])) {
          const newCard = newMap.get(c.english);
          if (!newCard) continue; // 삭제된 카드
          if (cardKey(newCard) !== cardKey(c)) {
            contentChangedCards.push(newCard); // 내용 변경 → unseen으로
          } else {
            seenCards.push(newCard);
          }
        }

        // unseen 처리: 삭제된 카드 제거, 내용 변경된 카드는 최신 내용으로 업데이트
        const seenSet = new Set(seenCards.map(c => c.english));
        const existingUnseen = (saved.unseen || [])
          .filter(c => newMap.has(c.english))
          .map(c => newMap.get(c.english));

        // 신규 카드 (seen에도 unseen에도 없는 것)
        const knownKeys = new Set([
          ...seenCards.map(c => c.english),
          ...existingUnseen.map(c => c.english)
        ]);
        const newCards = fetched.filter(c => !knownKeys.has(c.english));

        // unseen = 기존 unseen + 내용변경된 카드 + 신규 카드 (섞기)
        const mergedUnseen = shuffle([...existingUnseen, ...contentChangedCards, ...newCards]);

        googleSheetKeys = newKeys;
        cards = [...seenCards, ...mergedUnseen];
        currentIndex = seenCards.length > 0 ? seenCards.length - 1 : 0;

        saveState();
        renderCard();
      } catch (e) {
        document.getElementById('card').innerHTML = `<div class="error">데이터를 불러오지 못했어요.<br>CSV 링크를 확인해주세요.</div>`;
      }
    }

    loadCards();
  </script>
</body>
</html>
