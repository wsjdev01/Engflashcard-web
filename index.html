<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 플래시카드</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .counter {
      font-size: 14px;
      color: #999;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-section {
      flex: 1;
    }

    .meaning {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .explanation {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
    }

    .divider {
      border: none;
      border-top: 1px dashed #e0e0e0;
      margin: 24px 0;
    }

    .english {
      font-size: 16px;
      color: #1a1a1a;
      opacity: 0.25;
      line-height: 1.6;
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
      max-width: 480px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-prev {
      background: #e8e8e8;
      color: #555;
    }

    .btn-next {
      background: #4A90E2;
      color: white;
    }

    .loading {
      color: #999;
      font-size: 16px;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="counter" id="counter"></div>
  <div class="card" id="card">
    <div class="loading">불러오는 중...</div>
  </div>
  <div class="nav">
    <button class="btn-prev" onclick="prevCard()">← 이전</button>
    <button class="btn-next" onclick="nextCard()">다음 →</button>
  </div>

  <script>
    // ⬇️ 여기에 구글 시트 CSV 링크를 붙여넣으세요
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw9hzCMBy2uKaS5VP5oc5ShljTICePzVFr6bqbrnXoHoqsziFvFNiCZuipqBqf28bQMCE-swMWACbH/pub?gid=0&single=true&output=csv';

    let cards = [];
    let currentIndex = 0;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      return lines.slice(1).map(line => {
        const cols = line.split(',');
        return {
          meaning: (cols[0] || '').trim().replace(/^"|"$/g, ''),
          english: (cols[1] || '').trim().replace(/^"|"$/g, ''),
          explanation: (cols[2] || '').trim().replace(/^"|"$/g, ''),
        };
      }).filter(c => c.english);
    }

    function renderCard() {
      const card = cards[currentIndex];
      document.getElementById('counter').textContent = `${currentIndex + 1} / ${cards.length}`;
      document.getElementById('card').innerHTML = `
        <div class="top-section">
          <div class="meaning">${card.meaning}</div>
          ${card.explanation ? `<div class="explanation">${card.explanation}</div>` : ''}
        </div>
        <hr class="divider">
        <div class="english">${card.english}</div>
      `;
    }

    function nextCard() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        renderCard();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
      }
    }

    async function loadCards() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        cards = shuffle(parseCSV(text));
        renderCard();
      } catch (e) {
        document.getElementById('card').innerHTML = `<div class="error">데이터를 불러오지 못했어요.<br>CSV 링크를 확인해주세요.</div>`;
      }
    }

    loadCards();
  </script>
</body>
</html>
