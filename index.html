<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 플래시카드</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .counter {
      font-size: 14px;
      color: #999;
      margin-bottom: 16px;
    }

    .card-wrapper {
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      user-select: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .top-section {
      flex: 1;
    }

    .meaning {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .explanation {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
    }

    .divider {
      border: none;
      border-top: 1px dashed #e0e0e0;
      margin: 24px 0;
    }

    .english {
      font-size: 16px;
      color: #1a1a1a;
      opacity: 0.25;
      line-height: 1.6;
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
      max-width: 480px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-prev {
      background: #e8e8e8;
      color: #aaa;
    }

    .btn-prev.active {
      background: #4A90E2;
      color: white;
    }

    .btn-next {
      background: #4A90E2;
      color: white;
    }

    .btn-next.disabled {
      background: #e8e8e8;
      color: #aaa;
    }

    .loading {
      color: #999;
      font-size: 16px;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      text-align: center;
    }

    .btn-speak {
      margin-top: 10px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      color: #555;
      cursor: pointer;
      flex: none;
      width: auto;
    }

    .btn-speak:active {
      background: #f0f0f0;
    }
  </style>
</head>
<body>

  <div class="counter" id="counter"></div>
  <div class="card-wrapper">
    <div class="card" id="card">
      <div class="loading">불러오는 중...</div>
    </div>
  </div>
  <div class="nav">
    <button class="btn-prev" id="btnPrev" onclick="prevCard()">← 이전</button>
    <button class="btn-next" id="btnNext" onclick="nextCard()">다음 →</button>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw9hzCMBy2uKaS5VP5oc5ShljTICePzVFr6bqbrnXoHoqsziFvFNiCZuipqBqf28bQMCE-swMWACbH/pub?gid=0&single=true&output=csv';

    let cards = [];
    let currentIndex = 0;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      return lines.slice(1).map(line => {
        const cols = line.split(',');
        return {
          meaning: (cols[0] || '').trim().replace(/^"|"$/g, ''),
          english: (cols[1] || '').trim().replace(/^"|"$/g, ''),
          explanation: (cols[2] || '').trim().replace(/^"|"$/g, ''),
        };
      }).filter(c => c.english);
    }

    function updateButtons() {
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');

      if (currentIndex === 0) {
        btnPrev.classList.remove('active');
      } else {
        btnPrev.classList.add('active');
      }

      if (currentIndex === cards.length - 1) {
        btnNext.classList.add('disabled');
      } else {
        btnNext.classList.remove('disabled');
      }
    }

    function renderCard() {
      const card = cards[currentIndex];
      document.getElementById('counter').textContent = `${currentIndex + 1} / ${cards.length}`;
      document.getElementById('card').innerHTML = `
        <div class="top-section">
          <div class="meaning">${card.meaning}</div>
          ${card.explanation ? `<div class="explanation">${card.explanation}</div>` : ''}
        </div>
        <hr class="divider">
        <div class="english">${card.english}</div>
        <button class="btn-speak" onclick="speakEnglish()">🔊 듣기</button>
      `;
      updateButtons();
    }

    function nextCard() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        renderCard();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
      }
    }

    function speakEnglish() {
      speechSynthesis.cancel();
      setTimeout(() => {
        const utterance = new SpeechSynthesisUtterance(cards[currentIndex].english);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        const voices = speechSynthesis.getVoices();
        const engVoice = voices.find(v => v.lang.startsWith('en'));
        if (engVoice) utterance.voice = engVoice;
        speechSynthesis.speak(utterance);
      }, 100);
    }

    // 스와이프 기능
    let touchStartX = 0;
    let touchStartY = 0;

    const cardEl = document.getElementById('card');

    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });

    document.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0) nextCard();
        else prevCard();
      }
    });

    async function loadCards() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        cards = shuffle(parseCSV(text));
        renderCard();
      } catch (e) {
        document.getElementById('card').innerHTML = `<div class="error">데이터를 불러오지 못했어요.<br>CSV 링크를 확인해주세요.</div>`;
      }
    }

    loadCards();
  </script>
</body>
</html>
