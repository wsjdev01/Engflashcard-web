<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영어 플래시카드</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 0;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .counter { font-size: 14px; color: #999; }

    .hamburger {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #555;
      padding: 4px 8px;
      border-radius: 8px;
      line-height: 1;
    }

    /* ── Dropdown menu ── */
    .menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
    }
    .menu-overlay.open { display: block; }

    .menu {
      display: none;
      position: fixed;
      top: 52px;
      right: 16px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      z-index: 11;
      min-width: 200px;
      overflow: hidden;
    }
    .menu.open { display: block; }

    .menu-item {
      padding: 15px 20px;
      font-size: 15px;
      color: #1a1a1a;
      cursor: pointer;
      border-bottom: 1px solid #f2f2f2;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: #f5f5f5; }

    /* ── Main view ── */
    .main-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 20px 20px;
      min-height: calc(100vh - 48px);
      justify-content: center;
    }

    .card-wrapper { width: 100%; max-width: 480px; }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      min-height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      user-select: none;
      position: relative;
    }

    .bookmark-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      color: #f5a623;
    }

    .top-section { flex: 1; padding-right: 32px; }

    .meaning {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .explanation {
      font-size: 15px;
      color: #555;
      line-height: 1.6;
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
    }

    .divider {
      border: none;
      border-top: 1px dashed #e0e0e0;
      margin: 24px 0;
    }

    .english {
      font-size: 16px;
      color: #1a1a1a;
      opacity: 0.25;
      line-height: 1.6;
      font-style: italic;
    }

    .nav {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
      max-width: 480px;
    }

    .nav button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-prev { background: #e8e8e8; color: #aaa; }
    .btn-prev.active { background: #4A90E2; color: white; }
    .btn-next { background: #4A90E2; color: white; }
    .btn-next.disabled { background: #e8e8e8; color: #aaa; }

    /* ── List view ── */
    .list-view {
      display: none;
      flex-direction: column;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .list-view.open { display: flex; }

    .list-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background: white;
      border-bottom: 1px solid #ebebeb;
    }

    .list-back {
      background: none;
      border: none;
      font-size: 16px;
      color: #4A90E2;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
      flex-shrink: 0;
    }

    .list-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .list-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px 20px;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }

    .list-item {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .list-item:active { background: #f0f7ff; }

    .list-item-num {
      font-size: 12px;
      color: #ccc;
      min-width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    .list-item-meaning {
      font-size: 15px;
      color: #1a1a1a;
      line-height: 1.4;
    }

    .empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 15px;
      margin-top: 80px;
    }

    .loading { color: #999; font-size: 16px; }
    .error { color: #e74c3c; font-size: 14px; text-align: center; }
  </style>
</head>
<body>

  <!-- Dropdown menu -->
  <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
  <div class="menu" id="menu">
    <div class="menu-item" onclick="showList('seen')">공부한 카드</div>
    <div class="menu-item" onclick="showList('bookmarked')">저장한 카드</div>
    <div class="menu-item" onclick="goToLatest()">이어보기</div>
  </div>

  <!-- Main view -->
  <div id="mainView">
    <div class="header">
      <div class="counter" id="counter"></div>
      <button class="hamburger" onclick="toggleMenu()">☰</button>
    </div>
    <div class="main-view">
      <div class="card-wrapper">
        <div class="card" id="card">
          <div class="loading">불러오는 중...</div>
        </div>
      </div>
      <div class="nav">
        <button class="btn-prev" id="btnPrev" onclick="prevCard()">← 이전</button>
        <button class="btn-next" id="btnNext" onclick="nextCard()">다음 →</button>
      </div>
    </div>
  </div>

  <!-- List view -->
  <div class="list-view" id="listView">
    <div class="list-header">
      <button class="list-back" onclick="closeList()">← 돌아가기</button>
      <span class="list-title" id="listTitle"></span>
    </div>
    <div class="list-content" id="listContent"></div>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTw9hzCMBy2uKaS5VP5oc5ShljTICePzVFr6bqbrnXoHoqsziFvFNiCZuipqBqf28bQMCE-swMWACbH/pub?gid=0&single=true&output=csv';
    const STORAGE_KEY = 'engflashcard_state';

    let cards = [];
    let currentIndex = 0;
    let highWaterMark = 0;
    let bookmarks = new Set();
    let googleSheetKeys = [];

    // ── CSV ──────────────────────────────────────────────────

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current.trim());
      return result;
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      return lines.slice(1).map(line => {
        const cols = parseCSVLine(line);
        return { meaning: cols[0]||'', english: cols[1]||'', explanation: cols[2]||'' };
      }).filter(c => c.english);
    }

    // ── State ────────────────────────────────────────────────

    function cardKey(c) {
      return c.english + '||' + c.meaning + '||' + c.explanation;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        seen: cards.slice(0, highWaterMark + 1),
        unseen: cards.slice(highWaterMark + 1),
        currentIndex,
        highWaterMark,
        bookmarks: [...bookmarks],
        googleSheetKeys
      }));
    }

    // ── Render ───────────────────────────────────────────────

    function updateButtons() {
      const btnPrev = document.getElementById('btnPrev');
      const btnNext = document.getElementById('btnNext');
      if (currentIndex === 0) btnPrev.classList.remove('active');
      else btnPrev.classList.add('active');
      if (currentIndex === cards.length - 1) btnNext.classList.add('disabled');
      else btnNext.classList.remove('disabled');
    }

    function renderCard() {
      const card = cards[currentIndex];
      const isBookmarked = bookmarks.has(card.english);
      document.getElementById('counter').textContent = `${currentIndex + 1} / ${cards.length}`;
      document.getElementById('card').innerHTML = `
        <button class="bookmark-btn" onclick="toggleBookmark()">${isBookmarked ? '★' : '☆'}</button>
        <div class="top-section">
          <div class="meaning">${card.meaning}</div>
          ${card.explanation ? `<div class="explanation">${card.explanation}</div>` : ''}
        </div>
        <hr class="divider">
        <div class="english">${card.english}</div>
      `;
      updateButtons();
    }

    // ── Navigation ───────────────────────────────────────────

    function nextCard() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        if (currentIndex > highWaterMark) highWaterMark = currentIndex;
        renderCard();
        saveState();
      }
    }

    function prevCard() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
        saveState();
      }
    }

    function goToCard(index) {
      currentIndex = index;
      closeMenu();
      closeList();
      renderCard();
      saveState();
    }

    function goToLatest() {
      currentIndex = highWaterMark;
      closeMenu();
      renderCard();
      saveState();
    }

    // ── Bookmark ─────────────────────────────────────────────

    function toggleBookmark() {
      const key = cards[currentIndex].english;
      if (bookmarks.has(key)) bookmarks.delete(key);
      else bookmarks.add(key);
      renderCard();
      saveState();
    }

    // ── Menu ─────────────────────────────────────────────────

    function toggleMenu() {
      document.getElementById('menu').classList.toggle('open');
      document.getElementById('menuOverlay').classList.toggle('open');
    }

    function closeMenu() {
      document.getElementById('menu').classList.remove('open');
      document.getElementById('menuOverlay').classList.remove('open');
    }

    // ── List view ─────────────────────────────────────────────

    function showList(type) {
      closeMenu();
      const listTitle = document.getElementById('listTitle');
      const listContent = document.getElementById('listContent');

      let items = [];
      if (type === 'seen') {
        listTitle.textContent = '공부한 카드';
        items = cards.slice(0, highWaterMark + 1).map((c, i) => ({ card: c, num: i + 1, index: i }));
      } else {
        listTitle.textContent = '저장한 카드';
        items = cards
          .map((c, i) => ({ card: c, num: i + 1, index: i }))
          .filter(({ card }) => bookmarks.has(card.english));
      }

      if (items.length === 0) {
        listContent.innerHTML = `<div class="empty-msg">${type === 'seen' ? '아직 공부한 카드가 없어요.' : '저장한 카드가 없어요. 카드에서 ☆ 를 눌러보세요!'}</div>`;
      } else {
        listContent.innerHTML = items.map(({ card, num, index }) => `
          <div class="list-item" onclick="goToCard(${index})">
            <div class="list-item-num">${num}</div>
            <div class="list-item-meaning">${card.meaning}</div>
          </div>
        `).join('');
      }

      document.getElementById('mainView').style.display = 'none';
      document.getElementById('listView').classList.add('open');
    }

    function closeList() {
      document.getElementById('listView').classList.remove('open');
      document.getElementById('mainView').style.display = 'block';
    }

    // ── Swipe ─────────────────────────────────────────────────

    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });

    document.addEventListener('touchend', e => {
      if (document.getElementById('listView').classList.contains('open')) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
        if (dx < 0) nextCard();
        else prevCard();
      }
    });

    // ── Shuffle ───────────────────────────────────────────────

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // ── Load ──────────────────────────────────────────────────

    function isReordered(oldKeys, newKeys) {
      const newSet = new Set(newKeys);
      const oldSet = new Set(oldKeys);
      const oldCommon = oldKeys.filter(k => newSet.has(k));
      const newCommon = newKeys.filter(k => oldSet.has(k));
      return oldCommon.join('||') !== newCommon.join('||');
    }

    async function loadCards() {
      try {
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const fetched = parseCSV(text);
        const newKeys = fetched.map(c => c.english);
        const newMap = new Map(fetched.map(c => [c.english, c]));

        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');

        if (!saved) {
          googleSheetKeys = newKeys;
          cards = shuffle(fetched);
          currentIndex = 0;
          highWaterMark = 0;
          bookmarks = new Set();
          saveState();
          renderCard();
          return;
        }

        bookmarks = new Set(saved.bookmarks || []);
        const oldKeys = saved.googleSheetKeys || [];

        if (isReordered(oldKeys, newKeys)) {
          googleSheetKeys = newKeys;
          cards = shuffle(fetched);
          currentIndex = 0;
          highWaterMark = 0;
          saveState();
          renderCard();
          return;
        }

        // Seen: 삭제된 카드 제거, 내용 변경된 카드 → unseen으로
        const seenCards = [];
        const contentChangedCards = [];
        for (const c of (saved.seen || [])) {
          const newCard = newMap.get(c.english);
          if (!newCard) continue;
          if (cardKey(newCard) !== cardKey(c)) contentChangedCards.push(newCard);
          else seenCards.push(newCard);
        }

        const existingUnseen = (saved.unseen || [])
          .filter(c => newMap.has(c.english))
          .map(c => newMap.get(c.english));

        const knownKeys = new Set([...seenCards.map(c => c.english), ...existingUnseen.map(c => c.english)]);
        const newCards = fetched.filter(c => !knownKeys.has(c.english));
        const mergedUnseen = shuffle([...existingUnseen, ...contentChangedCards, ...newCards]);

        googleSheetKeys = newKeys;
        cards = [...seenCards, ...mergedUnseen];
        highWaterMark = seenCards.length > 0 ? seenCards.length - 1 : 0;
        currentIndex = highWaterMark;

        saveState();
        renderCard();
      } catch (e) {
        document.getElementById('card').innerHTML = `<div class="error">데이터를 불러오지 못했어요.<br>CSV 링크를 확인해주세요.</div>`;
      }
    }

    loadCards();
  </script>
</body>
</html>
